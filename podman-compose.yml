version: '3.8'

services:
  database:
    image: docker.io/library/postgres:16-alpine
    container_name: fleurverte_pg
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: fleurverte
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d fleurverte"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
