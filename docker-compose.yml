version: '3.8'

services:
  database:
    image: postgres:16
    container_name: fleurverte_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: fleurverte
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - fleurverte_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d fleurverte"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: fleurverte_app
    depends_on:
      database:
        condition: service_healthy
    networks:
      - fleurverte_network
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://root:@database:5432/fleurverte?serverVersion=16&charset=utf8"
    volumes:
      - ./:/app
      - /app/var
    ports:
      - "3010:8000"
    restart: always
    tty: true
    stdin_open: true

volumes:
  db_data:

networks:
  fleurverte_network:
    driver: bridge
